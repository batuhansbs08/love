<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Premium Çiçek Buketi</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      overflow: hidden;
      font-family: "Georgia", serif;
      background:
        radial-gradient(circle at 20% 20%, rgba(255, 231, 242, 0.95), transparent 32%),
        radial-gradient(circle at 80% 10%, rgba(226, 207, 255, 0.9), transparent 30%),
        radial-gradient(circle at 50% 90%, rgba(255, 216, 174, 0.75), transparent 35%),
        linear-gradient(135deg, #fff8fb 0%, #f8edff 45%, #fff2df 100%);
    }

    .scene {
      position: relative;
      width: min(92vw, 860px);
      height: min(92vh, 860px);
      display: flex;
      align-items: center;
      justify-content: center;
      filter: drop-shadow(0 35px 45px rgba(108, 61, 90, 0.22));
    }

    .glow {
      position: absolute;
      width: 620px;
      height: 620px;
      border-radius: 50%;
      background: radial-gradient(circle, rgba(255, 255, 255, 0.95), rgba(255, 214, 232, 0.25), transparent 68%);
      animation: pulse 5s ease-in-out infinite;
    }

    .sparkle {
      position: absolute;
      width: 7px;
      height: 7px;
      background: #fff;
      border-radius: 50%;
      box-shadow: 0 0 16px #fff, 0 0 30px rgba(255, 206, 232, 0.95);
      animation: twinkle 3.6s ease-in-out infinite;
    }

    .sparkle::before,
    .sparkle::after {
      content: "";
      position: absolute;
      inset: -7px 3px;
      background: linear-gradient(#fff, transparent);
      opacity: 0.9;
    }

    .sparkle::after {
      transform: rotate(90deg);
    }

    .s1 { top: 12%; left: 20%; animation-delay: .2s; }
    .s2 { top: 22%; right: 17%; animation-delay: 1.1s; }
    .s3 { bottom: 28%; left: 13%; animation-delay: 2s; }
    .s4 { bottom: 18%; right: 20%; animation-delay: .8s; }
    .s5 { top: 42%; left: 9%; animation-delay: 1.8s; }
    .s6 { top: 40%; right: 8%; animation-delay: 2.5s; }

    .bouquet {
      position: relative;
      width: 640px;
      height: 760px;
      transform-origin: bottom center;
      animation: bouquetFloat 6s ease-in-out infinite;
    }

    .stem {
      position: absolute;
      bottom: 120px;
      left: 50%;
      width: 9px;
      height: var(--h);
      border-radius: 999px;
      background: linear-gradient(90deg, #316c3d, #6fab67, #245430);
      transform-origin: bottom center;
      transform: translateX(-50%) rotate(var(--r));
      box-shadow: inset 1px 0 2px rgba(255,255,255,.35);
      z-index: 1;
    }

    .leaf {
      position: absolute;
      bottom: var(--b);
      left: 50%;
      width: 86px;
      height: 36px;
      border-radius: 90% 10% 90% 10%;
      background: linear-gradient(135deg, #2f7c48, #85bf69);
      transform: translateX(-50%) rotate(var(--r));
      transform-origin: 0% 50%;
      z-index: 2;
      opacity: .92;
      box-shadow: inset 10px -6px 12px rgba(18, 75, 35, 0.25);
    }

    .leaf::after {
      content: "";
      position: absolute;
      left: 11px;
      top: 17px;
      width: 62px;
      height: 2px;
      background: rgba(255,255,255,.35);
      transform: rotate(-5deg);
    }

    .flower {
      position: absolute;
      left: var(--x);
      top: var(--y);
      width: var(--size);
      height: var(--size);
      transform: rotate(var(--rot));
      z-index: var(--z);
      animation: flowerSway 5.5s ease-in-out infinite;
      animation-delay: var(--delay);
    }

    .petal {
      position: absolute;
      width: 47%;
      height: 64%;
      left: 26.5%;
      top: 2%;
      border-radius: 50% 50% 45% 45%;
      transform-origin: 50% 80%;
      background:
        radial-gradient(circle at 35% 22%, rgba(255,255,255,.85), transparent 24%),
        linear-gradient(160deg, var(--light), var(--main) 58%, var(--deep));
      box-shadow:
        inset -5px -9px 16px rgba(99, 20, 62, 0.14),
        inset 7px 8px 18px rgba(255, 255, 255, 0.28),
        0 8px 12px rgba(115, 42, 80, 0.12);
    }

    .p1 { transform: rotate(0deg); }
    .p2 { transform: rotate(45deg); }
    .p3 { transform: rotate(90deg); }
    .p4 { transform: rotate(135deg); }
    .p5 { transform: rotate(180deg); }
    .p6 { transform: rotate(225deg); }
    .p7 { transform: rotate(270deg); }
    .p8 { transform: rotate(315deg); }

    .inner-petal {
      position: absolute;
      width: 38%;
      height: 48%;
      left: 31%;
      top: 14%;
      border-radius: 55% 55% 45% 45%;
      transform-origin: 50% 78%;
      background:
        radial-gradient(circle at 40% 20%, rgba(255,255,255,.75), transparent 22%),
        linear-gradient(165deg, var(--light), var(--main), var(--deep));
      filter: saturate(1.08);
    }

    .ip1 { transform: rotate(22deg); }
    .ip2 { transform: rotate(82deg); }
    .ip3 { transform: rotate(142deg); }
    .ip4 { transform: rotate(202deg); }
    .ip5 { transform: rotate(262deg); }
    .ip6 { transform: rotate(322deg); }

    .core {
      position: absolute;
      width: 26%;
      height: 26%;
      left: 37%;
      top: 37%;
      border-radius: 50%;
      background:
        radial-gradient(circle at 35% 30%, #fff8b8, #f6c84f 45%, #b97722 78%);
      box-shadow:
        inset 0 -4px 8px rgba(106, 59, 9, 0.3),
        0 0 18px rgba(255, 225, 119, 0.68);
    }

    .rose .petal {
      border-radius: 68% 42% 64% 42%;
    }

    .rose .core {
      background:
        conic-gradient(from 30deg, var(--deep), var(--main), var(--light), var(--main), var(--deep));
      box-shadow: inset 0 0 16px rgba(94, 17, 50, 0.28);
    }

    .daisy .petal {
      width: 29%;
      height: 60%;
      left: 35.5%;
      top: 0;
      border-radius: 70% 70% 48% 48%;
    }

    .wrap {
      position: absolute;
      left: 50%;
      bottom: 28px;
      width: 360px;
      height: 250px;
      transform: translateX(-50%);
      z-index: 10;
    }

    .paper-left,
    .paper-right,
    .paper-front {
      position: absolute;
      bottom: 0;
      border-radius: 28px;
      backdrop-filter: blur(8px);
      box-shadow: 0 22px 32px rgba(111, 67, 85, 0.22);
    }

    .paper-left {
      left: 14px;
      width: 190px;
      height: 240px;
      background: linear-gradient(135deg, rgba(255, 255, 255, .88), rgba(255, 210, 225, .72));
      clip-path: polygon(0 18%, 100% 0, 76% 100%, 12% 100%);
      transform: rotate(-7deg);
    }

    .paper-right {
      right: 14px;
      width: 190px;
      height: 240px;
      background: linear-gradient(225deg, rgba(255, 255, 255, .9), rgba(230, 209, 255, .72));
      clip-path: polygon(0 0, 100% 18%, 88% 100%, 24% 100%);
      transform: rotate(7deg);
    }

    .paper-front {
      left: 44px;
      width: 272px;
      height: 205px;
      background:
        linear-gradient(145deg, rgba(255,255,255,.9), rgba(255,225,236,.78)),
        repeating-linear-gradient(45deg, transparent 0 10px, rgba(255,255,255,.3) 10px 12px);
      clip-path: polygon(0 14%, 100% 14%, 82% 100%, 18% 100%);
    }

    .ribbon {
      position: absolute;
      left: 50%;
      bottom: 76px;
      width: 190px;
      height: 42px;
      transform: translateX(-50%);
      border-radius: 999px;
      background: linear-gradient(90deg, #8c244e, #d24d82, #8c244e);
      box-shadow: 0 8px 18px rgba(112, 22, 61, 0.32), inset 0 5px 10px rgba(255,255,255,.22);
      z-index: 13;
    }

    .ribbon::before,
    .ribbon::after {
      content: "";
      position: absolute;
      top: 8px;
      width: 78px;
      height: 64px;
      background: linear-gradient(135deg, #a62b61, #ef76a1);
      clip-path: polygon(0 0, 100% 24%, 74% 100%, 0 70%);
      z-index: -1;
    }

    .ribbon::before {
      right: 132px;
      transform: rotate(8deg);
    }

    .ribbon::after {
      left: 132px;
      transform: scaleX(-1) rotate(8deg);
    }

    .label {
      position: absolute;
      left: 50%;
      bottom: 136px;
      transform: translateX(-50%) rotate(-2deg);
      z-index: 14;
      padding: 12px 22px;
      border-radius: 18px;
      color: #6e2445;
      background: rgba(255,255,255,.8);
      box-shadow: 0 8px 18px rgba(93, 52, 71, .12);
      letter-spacing: .8px;
      font-size: 20px;
      white-space: nowrap;
    }

    .label span {
      display: block;
      font-size: 12px;
      text-align: center;
      letter-spacing: 2px;
      text-transform: uppercase;
      color: #a45b78;
      margin-top: 3px;
    }

    @keyframes bouquetFloat {
      0%, 100% { transform: translateY(0) rotate(-.5deg); }
      50% { transform: translateY(-18px) rotate(.5deg); }
    }

    @keyframes flowerSway {
      0%, 100% { transform: rotate(var(--rot)) translateY(0); }
      50% { transform: rotate(calc(var(--rot) + 3deg)) translateY(-7px); }
    }

    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: .72; }
      50% { transform: scale(1.08); opacity: .95; }
    }

    @keyframes twinkle {
      0%, 100% { opacity: .15; transform: scale(.75) rotate(0deg); }
      50% { opacity: 1; transform: scale(1.18) rotate(45deg); }
    }

    @media (max-width: 720px) {
      .scene { transform: scale(.72); }
    }

    @media (max-width: 460px) {
      .scene { transform: scale(.58); }
    }
  </style>
</head>
<body>
  <main class="scene">
    <div class="glow"></div>
    <div class="sparkle s1"></div>
    <div class="sparkle s2"></div>
    <div class="sparkle s3"></div>
    <div class="sparkle s4"></div>
    <div class="sparkle s5"></div>
    <div class="sparkle s6"></div>

    <section class="bouquet" aria-label="Premium animasyonlu çiçek buketi">
      <div class="stem" style="--h: 430px; --r: -28deg;"></div>
      <div class="stem" style="--h: 455px; --r: -18deg;"></div>
      <div class="stem" style="--h: 505px; --r: -8deg;"></div>
      <div class="stem" style="--h: 520px; --r: 0deg;"></div>
      <div class="stem" style="--h: 500px; --r: 10deg;"></div>
      <div class="stem" style="--h: 455px; --r: 20deg;"></div>
      <div class="stem" style="--h: 425px; --r: 30deg;"></div>
      <div class="stem" style="--h: 470px; --r: 38deg;"></div>
      <div class="stem" style="--h: 468px; --r: -40deg;"></div>

      <div class="leaf" style="--b: 210px; --r: -150deg;"></div>
      <div class="leaf" style="--b: 265px; --r: 25deg;"></div>
      <div class="leaf" style="--b: 310px; --r: -30deg;"></div>
      <div class="leaf" style="--b: 355px; --r: 145deg;"></div>
      <div class="leaf" style="--b: 410px; --r: 20deg;"></div>
      <div class="leaf" style="--b: 445px; --r: -155deg;"></div>

      <div class="flower rose" style="--x: 62px; --y: 160px; --size: 148px; --rot: -24deg; --z: 5; --delay: .2s; --light: #ffc0d6; --main: #ef5f95; --deep: #9f275b;">
        <span class="petal p1"></span><span class="petal p2"></span><span class="petal p3"></span><span class="petal p4"></span><span class="petal p5"></span><span class="petal p6"></span><span class="petal p7"></span><span class="petal p8"></span>
        <span class="inner-petal ip1"></span><span class="inner-petal ip2"></span><span class="inner-petal ip3"></span><span class="inner-petal ip4"></span><span class="inner-petal ip5"></span><span class="inner-petal ip6"></span>
        <span class="core"></span>
      </div>

      <div class="flower" style="--x: 172px; --y: 78px; --size: 174px; --rot: 12deg; --z: 7; --delay: .7s; --light: #fff1a6; --main: #ffb93b; --deep: #df6e1d;">
        <span class="petal p1"></span><span class="petal p2"></span><span class="petal p3"></span><span class="petal p4"></span><span class="petal p5"></span><span class="petal p6"></span><span class="petal p7"></span><span class="petal p8"></span>
        <span class="inner-petal ip1"></span><span class="inner-petal ip2"></span><span class="inner-petal ip3"></span><span class="inner-petal ip4"></span><span class="inner-petal ip5"></span><span class="inner-petal ip6"></span>
        <span class="core"></span>
      </div>

      <div class="flower rose" style="--x: 320px; --y: 54px; --size: 190px; --rot: -4deg; --z: 8; --delay: 1.2s; --light: #f6d5ff; --main: #ba71f0; --deep: #6a2ea6;">
        <span class="petal p1"></span><span class="petal p2"></span><span class="petal p3"></span><span class="petal p4"></span><span class="petal p5"></span><span class="petal p6"></span><span class="petal p7"></span><span class="petal p8"></span>
        <span class="inner-petal ip1"></span><span class="inner-petal ip2"></span><span class="inner-petal ip3"></span><span class="inner-petal ip4"></span><span class="inner-petal ip5"></span><span class="inner-petal ip6"></span>
        <span class="core"></span>
      </div>

      <div class="flower daisy" style="--x: 462px; --y: 157px; --size: 146px; --rot: 24deg; --z: 6; --delay: .4s; --light: #ffffff; --main: #f7dfff; --deep: #c19ce7;">
        <span class="petal p1"></span><span class="petal p2"></span><span class="petal p3"></span><span class="petal p4"></span><span class="petal p5"></span><span class="petal p6"></span><span class="petal p7"></span><span class="petal p8"></span>
        <span class="inner-petal ip1"></span><span class="inner-petal ip2"></span><span class="inner-petal ip3"></span><span class="inner-petal ip4"></span><span class="inner-petal ip5"></span><span class="inner-petal ip6"></span>
        <span class="core"></span>
      </div>

      <div class="flower rose" style="--x: 110px; --y: 296px; --size: 132px; --rot: 28deg; --z: 4; --delay: 1.7s; --light: #ffd2df; --main: #ff7fa0; --deep: #c93665;">
        <span class="petal p1"></span><span class="petal p2"></span><span class="petal p3"></span><span class="petal p4"></span><span class="petal p5"></span><span class="petal p6"></span><span class="petal p7"></span><span class="petal p8"></span>
        <span class="inner-petal ip1"></span><span class="inner-petal ip2"></span><span class="inner-petal ip3"></span><span class="inner-petal ip4"></span><span class="inner-petal ip5"></span><span class="inner-petal ip6"></span>
        <span class="core"></span>
      </div>

      <div class="flower" style="--x: 252px; --y: 238px; --size: 164px; --rot: -18deg; --z: 6; --delay: .9s; --light: #fff7c8; --main: #ffe066; --deep: #e58e26;">
        <span class="petal p1"></span><span class="petal p2"></span><span class="petal p3"></span><span class="petal p4"></span><span class="petal p5"></span><span class="petal p6"></span><span class="petal p7"></span><span class="petal p8"></span>
        <span class="inner-petal ip1"></span><span class="inner-petal ip2"></span><span class="inner-petal ip3"></span><span class="inner-petal ip4"></span><span class="inner-petal ip5"></span><span class="inner-petal ip6"></span>
        <span class="core"></span>
      </div>

      <div class="flower rose" style="--x: 412px; --y: 292px; --size: 136px; --rot: -28deg; --z: 5; --delay: 1.4s; --light: #d8fff4; --main: #5fd0b8; --deep: #19806e;">
        <span class="petal p1"></span><span class="petal p2"></span><span class="petal p3"></span><span class="petal p4"></span><span class="petal p5"></span><span class="petal p6"></span><span class="petal p7"></span><span class="petal p8"></span>
        <span class="inner-petal ip1"></span><span class="inner-petal ip2"></span><span class="inner-petal ip3"></span><span class="inner-petal ip4"></span><span class="inner-petal ip5"></span><span class="inner-petal ip6"></span>
        <span class="core"></span>
      </div>

      <div class="flower daisy" style="--x: 215px; --y: 382px; --size: 118px; --rot: 16deg; --z: 3; --delay: 2s; --light: #ffffff; --main: #ffeaf2; --deep: #f19ab7;">
        <span class="petal p1"></span><span class="petal p2"></span><span class="petal p3"></span><span class="petal p4"></span><span class="petal p5"></span><span class="petal p6"></span><span class="petal p7"></span><span class="petal p8"></span>
        <span class="inner-petal ip1"></span><span class="inner-petal ip2"></span><span class="inner-petal ip3"></span><span class="inner-petal ip4"></span><span class="inner-petal ip5"></span><span class="inner-petal ip6"></span>
        <span class="core"></span>
      </div>

      <div class="flower" style="--x: 345px; --y: 390px; --size: 122px; --rot: -12deg; --z: 4; --delay: 2.4s; --light: #ffe5f1; --main: #ff9ac5; --deep: #c1457e;">
        <span class="petal p1"></span><span class="petal p2"></span><span class="petal p3"></span><span class="petal p4"></span><span class="petal p5"></span><span class="petal p6"></span><span class="petal p7"></span><span class="petal p8"></span>
        <span class="inner-petal ip1"></span><span class="inner-petal ip2"></span><span class="inner-petal ip3"></span><span class="inner-petal ip4"></span><span class="inner-petal ip5"></span><span class="inner-petal ip6"></span>
        <span class="core"></span>
      </div>

      <div class="wrap">
        <div class="paper-left"></div>
        <div class="paper-right"></div>
        <div class="paper-front"></div>
        <div class="label">Geleceğin En Güzel Annesi<span>Senin de Anneler Günün Kutlu Olsun Kıymetlim</span></div>
        <div class="ribbon"></div>
      </div>
    </section>
  </main>
</body>
</html>
